<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tier Engine Viewer (internal)</title>
<meta name="robots" content="noindex, nofollow">
<style>
  :root {
    --bg: #1b1420;
    --panel: #241a2b;
    --panel-alt: #2c2033;
    --border: #4a3a52;
    --text: #ede3d3;
    --text-muted: #a8998a;
    --accent: #b8874f;
    --accent-strong: #d9a765;
    --legal: #8a9a6b;
    --illegal: #a25c4a;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
  }
  body { padding: 16px 20px 60px; }
  h1 {
    font-size: 15px; font-weight: 700; letter-spacing: 0.02em;
    text-transform: uppercase; color: var(--accent-strong);
    margin: 0 0 4px;
  }
  .subtitle { color: var(--text-muted); font-size: 12px; margin-bottom: 16px; }
  .toolbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 16px;
    background: var(--panel); border: 1px solid var(--border);
    padding: 10px 14px; margin-bottom: 16px;
  }
  .toolbar label { color: var(--text-muted); font-size: 12px; margin-right: 6px; }
  select, input[type="checkbox"] { accent-color: var(--accent); }
  select {
    background: var(--panel-alt); color: var(--text); border: 1px solid var(--border);
    padding: 4px 8px; font-family: var(--sans); font-size: 13px;
  }
  .toggle { display: flex; align-items: center; gap: 6px; color: var(--text); font-size: 13px; }
  #status { color: var(--text-muted); font-size: 12px; }

  .search-box { position: relative; }
  #card-search {
    background: var(--panel-alt); color: var(--text); border: 1px solid var(--border);
    padding: 4px 8px; font-family: var(--sans); font-size: 13px; width: 240px;
  }
  .search-results {
    position: absolute; top: calc(100% + 2px); left: 0; z-index: 10; width: 280px;
    background: var(--panel); border: 1px solid var(--border); max-height: 260px; overflow-y: auto;
  }
  .search-results .result-item { padding: 6px 10px; cursor: pointer; font-size: 13px; }
  .search-results .result-item:hover { background: var(--panel-alt); }
  .search-results .no-results { padding: 6px 10px; color: var(--text-muted); font-size: 12px; font-style: italic; }

  .anchor-block {
    background: var(--panel); border: 1px solid var(--border);
    padding: 14px 16px; margin-bottom: 18px;
  }
  .anchor-name { font-size: 16px; font-weight: 700; color: var(--accent-strong); }
  .anchor-meta { color: var(--text-muted); font-size: 12px; margin: 2px 0 8px; }
  .anchor-text { white-space: pre-wrap; font-size: 13px; line-height: 1.45; }
  .badge {
    display: inline-block; padding: 1px 7px; font-size: 11px; font-weight: 600;
    border: 1px solid; text-transform: uppercase; letter-spacing: 0.03em;
  }
  .badge-legal { color: var(--legal); border-color: var(--legal); }
  .badge-illegal { color: var(--illegal); border-color: var(--illegal); }
  .badge-unknown { color: var(--text-muted); border-color: var(--border); }

  /* v2.10: mechanism + commonality-band badges */
  .badge-mech-text { color: var(--text-muted); border-color: var(--border); }
  .badge-mech-reminder { color: #7fa0c9; border-color: #7fa0c9; }
  .badge-mech-keyword { color: #8a9a6b; border-color: #8a9a6b; }
  .badge-mech-mana { color: #c99a4a; border-color: #c99a4a; }
  .badge-mech-keyword_grant { color: #a688c9; border-color: #a688c9; }
  .badge-mech-sentence { color: #6bafa0; border-color: #6bafa0; }
  .badge-band-full { color: var(--legal); border-color: var(--legal); }
  .badge-band-discounted { color: var(--accent); border-color: var(--accent); }
  .badge-band-rescue { color: var(--illegal); border-color: var(--illegal); }
  .badge-promoted { color: #d4af37; border-color: #d4af37; font-weight: 600; }
  td.mech-cell { white-space: nowrap; }

  .mana-fact-compare {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px;
  }
  .mana-fact-side {
    background: var(--bg); border: 1px solid var(--border); padding: 6px 8px;
    font-family: var(--mono); font-size: 11px; line-height: 1.6;
  }
  .mana-fact-side .side-label {
    font-family: var(--sans); font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.03em; color: var(--text-muted); display: block; margin-bottom: 4px;
  }
  .mana-fact-side .mf-row span.k { color: var(--text-muted); }

  .tier-section {
    background: var(--panel); border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .tier-header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
    background: var(--panel-alt);
  }
  .tier-title { font-weight: 700; color: var(--accent-strong); font-size: 13px; text-transform: uppercase; letter-spacing: 0.02em; }
  .tier-counts { color: var(--text-muted); font-size: 12px; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em;
    color: var(--text-muted); padding: 6px 10px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--panel);
  }
  tbody tr.row { cursor: pointer; border-bottom: 1px solid var(--panel-alt); }
  tbody tr.row:hover { background: var(--panel-alt); }
  tbody tr.row.hidden-row { display: none; }
  tbody td { padding: 6px 10px; vertical-align: top; }
  td.pos { color: var(--text-muted); width: 2.5em; font-family: var(--mono); }
  td.name { font-weight: 600; }
  td.num { font-family: var(--mono); text-align: right; white-space: nowrap; }
  tr.detail-row td {
    background: var(--panel-alt); padding: 10px 14px; border-bottom: 1px solid var(--border);
  }
  tr.detail-row.hidden-row { display: none; }
  .breakdown-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 6px; margin-bottom: 8px; font-family: var(--mono); font-size: 12px;
  }
  .breakdown-grid div span.k { color: var(--text-muted); display: block; font-size: 10px; text-transform: uppercase; }
  .fragment-box {
    font-family: var(--mono); font-size: 12px; background: var(--bg);
    border: 1px solid var(--border); padding: 6px 8px; margin-top: 4px; white-space: pre-wrap;
  }
  .empty-note { padding: 14px; color: var(--text-muted); font-style: italic; }

  .tier-section.tier3 { opacity: 0.82; }
  .tier-section.tier3 .tier-title { color: var(--text-muted); font-weight: 600; }
  .tier-section.tier3 .tier-header { background: var(--bg); }
  .show-proposals-btn {
    display: block; width: 100%; text-align: left; padding: 10px 14px;
    background: transparent; border: none; border-top: 1px solid var(--border);
    color: var(--accent); font-family: var(--sans); font-size: 12px; cursor: pointer;
  }
  .show-proposals-btn:hover { background: var(--panel-alt); color: var(--accent-strong); }
  .tag-chip {
    display: inline-block; font-family: var(--mono); font-size: 11px;
    background: var(--bg); border: 1px solid var(--border); padding: 1px 6px;
    margin: 2px 4px 2px 0;
  }
  .tag-chip.inherited { color: var(--text-muted); }

  /* Per-face lookup (2026-07-13): DFC/split/adventure/flip face-mode banner + row annotation */
  .face-banner {
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    background: var(--panel-alt); border: 1px solid var(--border);
    padding: 8px 14px; margin-bottom: 10px; font-size: 12px; color: var(--text-muted);
  }
  .face-banner .face-banner-label { color: var(--text); }
  .face-btn {
    background: var(--panel); color: var(--accent-strong); border: 1px solid var(--accent);
    padding: 3px 10px; font-family: var(--sans); font-size: 12px; cursor: pointer;
  }
  .face-btn:hover { background: var(--accent); color: var(--panel); }
  .face-btn.active { background: var(--accent-strong); color: var(--panel); border-color: var(--accent-strong); cursor: default; }
  .via-face-note { color: var(--text-muted); font-size: 11px; font-style: italic; }

  /* Card-info viewer expansion (2026-07-14): row thumbnail + full card
     detail (image/mana cost/type line/oracle text) so a fit judgment can be
     made without leaving the page to check Scryfall. */
  .row-thumb {
    width: 34px; height: auto; vertical-align: middle; margin-right: 8px;
    border-radius: 3px; display: inline-block; background: var(--panel-alt);
  }
  .anchor-block { display: flex; gap: 14px; }
  .anchor-image img { width: 146px; height: auto; border-radius: 6px; display: block; }
  .anchor-main { flex: 1; min-width: 0; }
  .candidate-card-block {
    display: flex; gap: 14px; margin-bottom: 10px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .candidate-card-block .candidate-image img { width: 146px; height: auto; border-radius: 6px; display: block; }
  .candidate-card-block .candidate-main { flex: 1; min-width: 0; }
  .candidate-meta { color: var(--text-muted); font-size: 12px; margin: 0 0 6px; }
  .candidate-text { white-space: pre-wrap; font-size: 13px; line-height: 1.4; }
</style>
</head>
<body>
  <h1>Tier Engine Viewer</h1>
  <div class="subtitle">Internal dev tool — experiments/, never leaves the pipeline repo. Read-only view of tier_engine.py's exported Tiers 0/1/2/3 (full lists).</div>

  <div class="toolbar">
    <div>
      <label for="anchor-select">Anchor</label>
      <select id="anchor-select"></select>
    </div>
    <div class="search-box">
      <label for="card-search">Search</label>
      <input type="text" id="card-search" placeholder="Card name…" autocomplete="off">
      <div id="search-results" class="search-results" style="display:none;"></div>
    </div>
    <div class="toggle">
      <input type="checkbox" id="legal-toggle" checked>
      <label for="legal-toggle" style="margin:0;color:var(--text);">Commander-legal only</label>
    </div>
    <div>
      <label for="mechanism-select">Mechanism</label>
      <select id="mechanism-select">
        <option value="">all</option>
        <option value="text">text</option>
        <option value="reminder">reminder</option>
        <option value="keyword">keyword</option>
        <option value="mana">mana</option>
        <option value="keyword_grant">keyword grant</option>
        <option value="sentence">sentence</option>
      </select>
    </div>
    <div>
      <label for="land-select">Card type</label>
      <select id="land-select">
        <option value="">all</option>
        <option value="nonland">nonland only</option>
        <option value="land">land only</option>
      </select>
    </div>
    <div id="status"></div>
  </div>

  <div id="face-banner" class="face-banner" style="display:none;"></div>
  <div id="anchor-block" class="anchor-block" style="display:none;"></div>
  <div id="tiers"></div>

<script>
(function () {
  "use strict";

  var TIER_LABELS = {
    "0": "Tier 0 — Functional reprint",
    "1": "Tier 1 — Whole ability shared verbatim",
    "2": "Tier 2 — Shared verbatim fragment",
    "3": "Tier 3 — tag-overlap proposals (machine-suggested, not confirmed)"
  };
  var BREAKDOWN_LABELS = [
    ["raw", "raw"], ["ci", "ci"], ["mv", "mv"], ["scope", "scope"],
    ["dur", "dur"], ["exc", "exc"], ["pol", "pol"], ["cond", "cond"], ["aff", "aff"], ["promo", "promo"]
  ];

  var state = { index: null, currentSlug: null, legalOnly: true, mechanismFilter: "", landFilter: "" };

  var MECHANISM_LABELS = {
    text: "text", reminder: "reminder", keyword: "keyword", mana: "mana",
    keyword_grant: "keyword grant", sentence: "sentence",
  };

  function mechanismBadge(mech) {
    if (!mech) return "";
    var label = MECHANISM_LABELS[mech] || mech;
    return '<span class="badge badge-mech-' + escapeHtml(mech) + '">' + escapeHtml(label) + '</span>';
  }

  function bandBadge(band) {
    if (!band) return "";
    return '<span class="badge badge-band-' + escapeHtml(band) + '">' + escapeHtml(band) + '</span>';
  }

  // First-class phrase bucket (2026-07-11, revised same day to a scalar
  // bonus): a promoted row gets a flat +PROMOTED_PHRASE_BONUS to its rank
  // in tier_engine.py's compute_rank() (visible as its own "promo" column
  // in the breakdown grid below) -- NOT a categorical sort-to-top rule.
  // This badge is just a visible marker that the bonus applied, same
  // display-only spirit as the corroboration line below it.
  function promotedBadge(promoted) {
    if (!promoted) return "";
    return '<span class="badge badge-promoted">promoted</span>';
  }

  function escapeHtml(s) {
    if (s === null || s === undefined) return "";
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c];
    });
  }

  function fmtNum(n, digits) {
    if (n === null || n === undefined) return "—";
    return Number(n).toFixed(digits === undefined ? 2 : digits);
  }

  function legalBadge(legal) {
    if (legal === true) return '<span class="badge badge-legal">Legal</span>';
    if (legal === false) return '<span class="badge badge-illegal">Not legal</span>';
    return '<span class="badge badge-unknown">Unknown</span>';
  }

  function setStatus(msg) {
    document.getElementById("status").textContent = msg;
  }

  function populateSelect(idx) {
    var select = document.getElementById("anchor-select");
    select.innerHTML = "";
    idx.anchors.forEach(function (a) {
      var opt = document.createElement("option");
      opt.value = a.slug;
      opt.textContent = a.name + "  (T1=" + a.tier_counts["1"] + " T2=" + a.tier_counts["2"] + ")";
      select.appendChild(opt);
    });
  }

  function loadIndex() {
    setStatus("loading index.json…");
    fetch("./data/index.json")
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (idx) {
        state.index = idx;
        populateSelect(idx);
        setStatus(idx.anchors.length + " anchor(s) — generated " + idx.generated_at);
        if (idx.anchors.length > 0) loadAnchor(idx.anchors[0].slug);
      })
      .catch(function (err) {
        setStatus("failed to load ./data/index.json: " + err.message + " — run emit_viewer.py and serve this directory over HTTP (fetch of local files fails under file://).");
      });
  }

  function refreshIndexAndSelect(name) {
    return fetch("./data/index.json")
      .then(function (r) { return r.json(); })
      .then(function (idx) {
        state.index = idx;
        populateSelect(idx);
        var match = idx.anchors.filter(function (a) { return a.name === name; })[0];
        if (match) {
          document.getElementById("anchor-select").value = match.slug;
          state.currentSlug = match.slug;
        }
      });
  }

  function renderSearchResults(results) {
    var box = document.getElementById("search-results");
    box.innerHTML = "";
    if (results.length === 0) {
      box.innerHTML = '<div class="no-results">no matches</div>';
      box.style.display = "";
      return;
    }
    results.forEach(function (r) {
      var item = document.createElement("div");
      item.className = "result-item";
      item.textContent = r.name;
      item.addEventListener("click", function () {
        selectSearchResult(r.name);
      });
      box.appendChild(item);
    });
    box.style.display = "";
  }

  // Per-face lookup (2026-07-13): shared fetch path for a plain search-box
  // lookup AND the face-banner's flip/weigh-both/view-single-face buttons --
  // mode/faceIndex are optional (undefined means "let the server decide,"
  // same default resolution serve_viewer.py's resolve_query() documents).
  function fetchAnchorByName(name, mode, faceIndex) {
    var url = "api/anchor?name=" + encodeURIComponent(name);
    if (mode) url += "&mode=" + encodeURIComponent(mode);
    if (faceIndex !== undefined && faceIndex !== null) url += "&face=" + encodeURIComponent(faceIndex);
    setStatus("computing " + name + "…");
    return fetch(url)
      .then(function (r) {
        if (!r.ok) {
          return r.json().then(function (e) { throw new Error(e.error || ("HTTP " + r.status)); });
        }
        return r.json();
      })
      .then(function (data) {
        renderAnchor(data);
        setStatus("anchor generated " + data.generated_at + " · corpus " + data.corpus_cards.toLocaleString() + " cards · export runtime " + data.runtime_seconds + "s");
        return refreshIndexAndSelect(data.anchor.name);
      })
      .catch(function (err) {
        setStatus("lookup failed: " + err.message);
      });
  }

  function selectSearchResult(name) {
    document.getElementById("search-results").style.display = "none";
    document.getElementById("card-search").value = "";
    fetchAnchorByName(name);
  }

  function wireSearch() {
    var input = document.getElementById("card-search");
    var box = document.getElementById("search-results");
    var debounceTimer = null;

    input.addEventListener("input", function (e) {
      var q = e.target.value.trim();
      clearTimeout(debounceTimer);
      if (q.length < 2) {
        box.style.display = "none";
        return;
      }
      debounceTimer = setTimeout(function () {
        fetch("api/search?q=" + encodeURIComponent(q))
          .then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          })
          .then(function (data) { renderSearchResults(data.results); })
          .catch(function (err) {
            box.innerHTML = '<div class="no-results">search unavailable (' + err.message + ') — run via serve_viewer.py</div>';
            box.style.display = "";
          });
      }, 250);
    });

    input.addEventListener("keydown", function (e) {
      if (e.key !== "Enter") return;
      e.preventDefault();
      // Per-face lookup (2026-07-13): always resolve exactly what was
      // typed, never substitute the sole autocomplete suggestion's
      // (necessarily longer, combined) name -- a bare DFC face name is
      // always a strict prefix/substring of its own combined name, so a
      // "single suggestion? use it" shortcut would silently upgrade every
      // exact face-name query (e.g. "Ulvenwald Captive") into a weigh-both
      // lookup for the whole card, defeating the point of typing the face
      // name at all. Click a dropdown ITEM (below) if you want its exact
      // (combined) name instead.
      if (e.target.value.trim()) {
        selectSearchResult(e.target.value.trim());
      }
    });

    document.addEventListener("click", function (e) {
      if (e.target !== input && !box.contains(e.target)) {
        box.style.display = "none";
      }
    });
  }

  function loadAnchor(slug) {
    state.currentSlug = slug;
    setStatus("loading " + slug + ".json…");
    fetch("./data/" + slug + ".json")
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        renderAnchor(data);
        setStatus("anchor generated " + data.generated_at + " · corpus " + data.corpus_cards.toLocaleString() + " cards · export runtime " + data.runtime_seconds + "s");
      })
      .catch(function (err) {
        setStatus("failed to load " + slug + ".json: " + err.message);
      });
  }

  // Per-face lookup (2026-07-13): data.face_context is null for an
  // ordinary single-faced card (the overwhelming majority) -- banner
  // stays hidden. Non-null for any multi-faced card in FACE_SPLIT_LAYOUTS,
  // whether the CURRENT view is "weigh both" (today's existing whole-card
  // behavior) or scoped to one face -- lets you jump between all three
  // views for the same card without retyping a name.
  function renderFaceBanner(faceContext) {
    var banner = document.getElementById("face-banner");
    if (!faceContext) {
      banner.style.display = "none";
      banner.innerHTML = "";
      return;
    }
    banner.style.display = "";
    var html = faceContext.mode === "weigh_both"
      ? '<span class="face-banner-label">Weighing BOTH faces of ' + escapeHtml(faceContext.combined_name) + '</span>'
      : '<span class="face-banner-label">Showing just "' + escapeHtml(faceContext.face_name) + '" (one face of ' + escapeHtml(faceContext.combined_name) + ')</span>';
    faceContext.all_face_names.forEach(function (faceName, i) {
      var isCurrent = faceContext.mode === "face" && faceContext.face_index === i;
      html += ' <button type="button" class="face-btn' + (isCurrent ? " active" : "") + '" data-face-index="' + i + '">View: ' + escapeHtml(faceName) + '</button>';
    });
    html += ' <button type="button" class="face-btn' + (faceContext.mode === "weigh_both" ? " active" : "") + '" data-weighboth="1">Weigh both faces</button>';
    banner.innerHTML = html;

    var combinedName = faceContext.combined_name;
    banner.querySelectorAll(".face-btn[data-face-index]").forEach(function (btn) {
      var i = Number(btn.dataset.faceIndex);
      btn.addEventListener("click", function () { fetchAnchorByName(combinedName, "face", i); });
    });
    var weighBtn = banner.querySelector(".face-btn[data-weighboth]");
    weighBtn.addEventListener("click", function () { fetchAnchorByName(combinedName, "weighboth"); });
  }

  function renderAnchor(data) {
    var a = data.anchor;
    renderFaceBanner(data.face_context);
    var block = document.getElementById("anchor-block");
    block.style.display = "";
    block.innerHTML =
      (a.image_url ? '<div class="anchor-image"><img src="' + escapeHtml(a.image_url) + '" alt="' + escapeHtml(a.name) + '" loading="lazy"></div>' : "") +
      '<div class="anchor-main">' +
        '<div class="anchor-name">' + escapeHtml(a.name) + " " + legalBadge(a.legal_commander) + '</div>' +
        '<div class="anchor-meta">' + escapeHtml(a.mana_cost) + " · " + escapeHtml(a.type_line) +
          " · CI: " + (a.color_identity.length ? escapeHtml(a.color_identity.join("")) : "colorless") +
          (a.subtypes.length ? " · subtypes: " + escapeHtml(a.subtypes.join(", ")) : "") +
        '</div>' +
        '<div class="anchor-text">' + escapeHtml(a.oracle_text) + '</div>' +
      '</div>';

    var tiersDiv = document.getElementById("tiers");
    tiersDiv.innerHTML = "";
    ["0", "1", "2"].forEach(function (t) {
      tiersDiv.appendChild(renderTierSection(t, data.tiers[t]));
    });
    if (data.tiers["3"]) {
      tiersDiv.appendChild(renderTier3Section(data.tiers["3"]));
    }
    applyFilter();
  }

  function renderTierSection(tierKey, tierData) {
    var section = document.createElement("div");
    section.className = "tier-section";
    section.dataset.tier = tierKey;

    var header = document.createElement("div");
    header.className = "tier-header";
    header.innerHTML =
      '<span class="tier-title">' + TIER_LABELS[tierKey] + '</span>' +
      '<span class="tier-counts" data-role="counts">' + tierData.count + ' total</span>';
    section.appendChild(header);

    if (tierData.rows.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty-note";
      empty.textContent = "none";
      section.appendChild(empty);
      return section;
    }

    var table = document.createElement("table");
    var hasRank = tierData.rows.some(function (r) { return r.rank_score !== null; });
    var colCount = hasRank ? 8 : 7;
    table.innerHTML =
      '<thead><tr>' +
        '<th class="pos">#</th><th>Name</th>' +
        (hasRank ? '<th class="num">Rank</th>' : '') +
        '<th>Mechanism</th>' +
        '<th class="num">MVΔ</th><th>CI relation</th><th>Type bucket</th><th>Legal</th>' +
      '</tr></thead>';
    var tbody = document.createElement("tbody");

    tierData.rows.forEach(function (row, i) {
      var tr = document.createElement("tr");
      tr.className = "row";
      tr.dataset.legal = row.legal_commander === true ? "1" : (row.legal_commander === false ? "0" : "u");
      tr.dataset.mechanism = row.mechanism || "";
      tr.dataset.land = row.is_land === true ? "1" : (row.is_land === false ? "0" : "u");
      tr.innerHTML =
        '<td class="pos">' + (i + 1) + '</td>' +
        '<td class="name">' +
          (row.candidate_image_small ? '<img class="row-thumb" src="' + escapeHtml(row.candidate_image_small) + '" alt="" loading="lazy">' : "") +
          escapeHtml(row.name) +
          (row.via_combined_name ? '<br><span class="via-face-note">via ' + escapeHtml(row.via_combined_name) + '</span>' : "") +
        '</td>' +
        (hasRank ? '<td class="num">' + fmtNum(row.rank_score) + '</td>' : '') +
        '<td class="mech-cell">' + mechanismBadge(row.mechanism) + ' ' + bandBadge(row.commonality_band) + ' ' + promotedBadge(row.promoted) + '</td>' +
        '<td class="num">' + (row.mv_delta === null || row.mv_delta === undefined ? "—" : (row.mv_delta >= 0 ? "+" : "") + row.mv_delta) + '</td>' +
        '<td>' + escapeHtml(row.ci_relation) + '</td>' +
        '<td>' + escapeHtml(row.type_bucket) + '</td>' +
        '<td>' + legalBadge(row.legal_commander) + '</td>';

      var detailTr = document.createElement("tr");
      detailTr.className = "detail-row";
      detailTr.dataset.legal = tr.dataset.legal;
      detailTr.dataset.mechanism = tr.dataset.mechanism;
      detailTr.dataset.land = tr.dataset.land;
      detailTr.style.display = "none";
      var detailTd = document.createElement("td");
      detailTd.colSpan = colCount;
      detailTd.innerHTML = renderDetail(row);
      detailTr.appendChild(detailTd);

      tr.addEventListener("click", function () {
        detailTr.style.display = detailTr.style.display === "none" ? "" : "none";
      });

      tbody.appendChild(tr);
      tbody.appendChild(detailTr);
    });

    table.appendChild(tbody);
    section.appendChild(table);
    return section;
  }

  var MANA_FACT_FIELDS = [
    ["colors", "colors"], ["colorless_amount", "colorless"], ["amount", "amount"],
    ["source_class", "class"], ["repeatable", "repeatable"], ["any_color", "any color"],
    ["ci_restricted", "CI-restricted"], ["is_hybrid", "hybrid"], ["mixed", "mixed"],
    ["has_rider", "rider"], ["widening", "widening"],
  ];

  function fmtManaFactValue(v) {
    if (v === null || v === undefined) return "—";
    if (Array.isArray(v)) return v.length ? v.join("").toUpperCase() : "(colorless)";
    if (v === true) return "yes";
    if (v === false) return "no";
    return String(v);
  }

  function renderManaFactSide(fact, label) {
    if (!fact) return '<div class="mana-fact-side"><span class="side-label">' + escapeHtml(label) + '</span>—</div>';
    var html = '<div class="mana-fact-side"><span class="side-label">' + escapeHtml(label) + '</span>';
    MANA_FACT_FIELDS.forEach(function (pair) {
      html += '<div class="mf-row"><span class="k">' + pair[1] + ':</span> ' + escapeHtml(fmtManaFactValue(fact[pair[0]])) + '</div>';
    });
    html += '</div>';
    return html;
  }

  function renderDetail(row) {
    var html = "";
    if (row.candidate_oracle_text !== null && row.candidate_oracle_text !== undefined) {
      html += '<div class="candidate-card-block">' +
        (row.candidate_image_normal ? '<div class="candidate-image"><img src="' + escapeHtml(row.candidate_image_normal) + '" alt="' + escapeHtml(row.name) + '" loading="lazy"></div>' : "") +
        '<div class="candidate-main">' +
          '<div class="candidate-meta">' + escapeHtml(row.candidate_mana_cost || "") + " · " + escapeHtml(row.candidate_type_line || "") + '</div>' +
          '<div class="candidate-text">' + escapeHtml(row.candidate_oracle_text) + '</div>' +
        '</div>' +
      '</div>';
    }
    var headerBits = [];
    if (row.mechanism) headerBits.push(mechanismBadge(row.mechanism));
    if (row.promoted) headerBits.push(promotedBadge(row.promoted));
    if (row.commonality_band) {
      headerBits.push(bandBadge(row.commonality_band));
      if (row.commonality_weight !== null && row.commonality_weight !== undefined) {
        headerBits.push('<span style="color:var(--text-muted);font-size:11px;">weight=' + fmtNum(row.commonality_weight, 2) + '</span>');
      }
    }
    if (headerBits.length) {
      html += '<div style="margin-bottom:8px;">' + headerBits.join(" ") + '</div>';
    }

    if (row.breakdown) {
      html += '<div class="breakdown-grid">';
      BREAKDOWN_LABELS.forEach(function (pair) {
        html += '<div><span class="k">' + pair[0] + '</span>' + fmtNum(row.breakdown[pair[1]]) + '</div>';
      });
      html += '</div>';
    } else {
      html += '<div style="color:var(--text-muted);font-size:12px;margin-bottom:6px;">No rank formula for this tier (full-text/frame equality).</div>';
    }

    if (row.mechanism === "keyword") {
      html += '<div class="fragment-box">keyword: ' + escapeHtml(row.keyword || "") +
        '  ·  anchor param: ' + escapeHtml(row.anchor_param === null || row.anchor_param === undefined ? "(none)" : row.anchor_param) +
        '  vs  candidate param: ' + escapeHtml(row.candidate_param === null || row.candidate_param === undefined ? "(none)" : row.candidate_param) +
        '</div>';
    } else if (row.mechanism === "mana") {
      html += '<div class="mana-fact-compare">' +
        renderManaFactSide(row.anchor_mana_fact, "anchor") +
        renderManaFactSide(row.candidate_mana_fact, "candidate") +
        '</div>';
    }

    if (row.fragment) {
      var dfLabel = row.fragment_df === null || row.fragment_df === undefined
        ? ""
        : (" (DF" + (row.fragment_df_exact ? "=" : "≈") + row.fragment_df + ")");
      var fragText = escapeHtml(row.fragment) + dfLabel;
      // Cumulative fragment scoring (2026-07-10 ruling): extra qualifying
      // runs beyond the primary, same paragraph pair, each with its own DF.
      if (row.extra_fragments && row.extra_fragments.length) {
        row.extra_fragments.forEach(function (ef) {
          var efDfLabel = ef.df === null || ef.df === undefined
            ? ""
            : (" (DF" + (ef.df_exact ? "=" : "≈") + ef.df + ")");
          fragText += " + " + escapeHtml(ef.text) + efDfLabel;
        });
      }
      html += '<div class="fragment-box">' + fragText + '</div>';
    } else if (row.evidence) {
      html += '<div class="fragment-box">' + escapeHtml(row.evidence) + '</div>';
    }
    // Secondary corroboration (2026-07-11): display-only, never a rank
    // input -- shown separately and visually de-emphasized so it reads as
    // "also seen" rather than part of the scored match. Two kinds: a
    // shared short clause (below the n-gram floor, any DF band), or a
    // shared keyword beyond the one already used as primary evidence.
    if (row.corroboration && row.corroboration.length) {
      var corrText = row.corroboration.map(function (c) {
        if (c.kind === "keyword") {
          var param = c.anchor_param ? (" " + c.anchor_param) : "";
          return escapeHtml(c.keyword + param) + " (DF=" + c.df + ")";
        }
        return escapeHtml(c.text) + " (DF=" + c.df + ")";
      }).join("; ");
      html += '<div style="color:var(--text-muted);font-size:11px;margin-top:4px;">also seen: ' + corrText + '</div>';
    }
    var extras = [];
    if (row.type_match !== null && row.type_match !== undefined) extras.push("type_match=" + row.type_match);
    if (row.shared_subtypes && row.shared_subtypes.length) extras.push("shared_subtypes=" + row.shared_subtypes.join(","));
    if (row.keyword_overlap && row.keyword_overlap.length) extras.push("keywords=" + row.keyword_overlap.join(","));
    if (extras.length) {
      html += '<div style="color:var(--text-muted);font-size:11px;margin-top:6px;">' + escapeHtml(extras.join("  ·  ")) + '</div>';
    }
    return html;
  }

  function renderTier3Section(tierData) {
    var section = document.createElement("div");
    section.className = "tier-section tier3";
    section.dataset.tier = "3";

    var header = document.createElement("div");
    header.className = "tier-header";
    header.innerHTML =
      '<span class="tier-title">' + TIER_LABELS["3"] + '</span>' +
      '<span class="tier-counts" data-role="counts">' + tierData.count + ' total</span>';
    section.appendChild(header);

    if (tierData.rows.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty-note";
      empty.textContent = "none";
      section.appendChild(empty);
      return section;
    }

    var body = document.createElement("div");
    var btn = document.createElement("button");
    btn.className = "show-proposals-btn";
    btn.type = "button";
    btn.textContent = "▸ show " + tierData.rows.length + " proposal" + (tierData.rows.length === 1 ? "" : "s");
    var expanded = false;
    btn.addEventListener("click", function () {
      expanded = !expanded;
      if (expanded && !body.dataset.built) {
        body.appendChild(renderTier3Table(tierData.rows));
        body.dataset.built = "1";
        applyFilter();
      }
      body.style.display = expanded ? "" : "none";
      btn.textContent = (expanded ? "▾ hide " : "▸ show ") + tierData.rows.length + " proposal" + (tierData.rows.length === 1 ? "" : "s");
    });
    section.appendChild(btn);
    body.style.display = "none";
    section.appendChild(body);
    return section;
  }

  function renderTier3Table(rows) {
    var table = document.createElement("table");
    table.innerHTML =
      '<thead><tr>' +
        '<th class="pos">#</th><th>Name</th><th class="num">Score</th>' +
        '<th class="num">MVΔ</th><th>CI relation</th><th>Type bucket</th><th>Legal</th>' +
      '</tr></thead>';
    var tbody = document.createElement("tbody");

    rows.forEach(function (row, i) {
      var tr = document.createElement("tr");
      tr.className = "row";
      tr.dataset.legal = row.legal_commander === true ? "1" : (row.legal_commander === false ? "0" : "u");
      tr.dataset.land = row.is_land === true ? "1" : (row.is_land === false ? "0" : "u");
      tr.innerHTML =
        '<td class="pos">' + (i + 1) + '</td>' +
        '<td class="name">' +
          (row.candidate_image_small ? '<img class="row-thumb" src="' + escapeHtml(row.candidate_image_small) + '" alt="" loading="lazy">' : "") +
          escapeHtml(row.name) +
        '</td>' +
        '<td class="num">' + fmtNum(row.score) + '</td>' +
        '<td class="num">' + (row.mv_delta === null || row.mv_delta === undefined ? "—" : (row.mv_delta >= 0 ? "+" : "") + row.mv_delta) + '</td>' +
        '<td>' + escapeHtml(row.ci_relation) + '</td>' +
        '<td>' + escapeHtml(row.type_bucket) + '</td>' +
        '<td>' + legalBadge(row.legal_commander) + '</td>';

      var detailTr = document.createElement("tr");
      detailTr.className = "detail-row";
      detailTr.dataset.legal = tr.dataset.legal;
      detailTr.dataset.land = tr.dataset.land;
      detailTr.style.display = "none";
      var detailTd = document.createElement("td");
      detailTd.colSpan = 7;
      detailTd.innerHTML = renderTier3Detail(row);
      detailTr.appendChild(detailTd);

      tr.addEventListener("click", function () {
        detailTr.style.display = detailTr.style.display === "none" ? "" : "none";
      });

      tbody.appendChild(tr);
      tbody.appendChild(detailTr);
    });

    table.appendChild(tbody);
    return table;
  }

  function renderTier3Detail(row) {
    var html = "";
    if (row.candidate_oracle_text !== null && row.candidate_oracle_text !== undefined) {
      html += '<div class="candidate-card-block">' +
        (row.candidate_image_normal ? '<div class="candidate-image"><img src="' + escapeHtml(row.candidate_image_normal) + '" alt="' + escapeHtml(row.name) + '" loading="lazy"></div>' : "") +
        '<div class="candidate-main">' +
          '<div class="candidate-meta">' + escapeHtml(row.candidate_mana_cost || "") + " · " + escapeHtml(row.candidate_type_line || "") + '</div>' +
          '<div class="candidate-text">' + escapeHtml(row.candidate_oracle_text) + '</div>' +
        '</div>' +
      '</div>';
    }
    if (!row.shared_tags || row.shared_tags.length === 0) {
      html += '<div style="color:var(--text-muted);font-size:12px;">no shared tags recorded</div>';
      return html;
    }
    html += '<div>';
    row.shared_tags.forEach(function (t) {
      var directness = (t.anchor_direct && t.candidate_direct) ? "direct" : "inherited";
      html += '<span class="tag-chip' + (directness === "inherited" ? " inherited" : "") + '">' +
        escapeHtml(t.slug) + ' (idf=' + fmtNum(t.idf) + ', ' + directness + ')</span>';
    });
    html += '</div>';
    return html;
  }

  function applyFilter() {
    var legalOnly = state.legalOnly;
    var mechFilter = state.mechanismFilter;
    var landFilter = state.landFilter;
    document.querySelectorAll(".tier-section").forEach(function (section) {
      var rows = section.querySelectorAll("tr.row");
      var shown = 0, hidden = 0;
      rows.forEach(function (tr) {
        var isLegal = tr.dataset.legal === "1";
        var mechMatches = !mechFilter || tr.dataset.mechanism === mechFilter;
        var landMatches = !landFilter ||
          (landFilter === "land" && tr.dataset.land === "1") ||
          (landFilter === "nonland" && tr.dataset.land === "0");
        var visible = (!legalOnly || isLegal) && mechMatches && landMatches;
        tr.classList.toggle("hidden-row", !visible);
        var detail = tr.nextElementSibling;
        if (detail && detail.classList.contains("detail-row")) {
          detail.classList.toggle("hidden-row", !visible);
          if (!visible) detail.style.display = "none";
        }
        if (visible) shown++; else hidden++;
      });
      var countsEl = section.querySelector('[data-role="counts"]');
      if (countsEl && rows.length > 0) {
        countsEl.textContent = shown + " shown / " + hidden + " hidden (of " + rows.length + ")";
      }
    });
  }

  document.getElementById("anchor-select").addEventListener("change", function (e) {
    loadAnchor(e.target.value);
  });
  document.getElementById("mechanism-select").addEventListener("change", function (e) {
    state.mechanismFilter = e.target.value;
    applyFilter();
  });
  document.getElementById("legal-toggle").addEventListener("change", function (e) {
    state.legalOnly = e.target.checked;
    applyFilter();
  });
  document.getElementById("land-select").addEventListener("change", function (e) {
    state.landFilter = e.target.value;
    applyFilter();
  });
  wireSearch();

  loadIndex();
})();
</script>
</body>
</html>
