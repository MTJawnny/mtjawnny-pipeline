name: build

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RCLONE_REMOTE: "r2:"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Work around GH-runner systemd-resolved DNS flakiness
        # Go binaries (rclone) intermittently fail to resolve hosts through
        # the runner's 127.0.0.53 systemd-resolved stub ("server misbehaving"),
        # even when other tools (Python requests) resolve the same runner's
        # DNS fine. Point resolv.conf at a real public resolver before any
        # rclone network call happens. Known GH Actions runner flakiness,
        # not specific to this repo's R2 config.
        run: echo "nameserver 1.1.1.1" | sudo tee /etc/resolv.conf

      - name: Configure rclone remote (r2)
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          rclone config create r2 s3 \
            provider=Cloudflare \
            access_key_id="$R2_ACCESS_KEY_ID" \
            secret_access_key="$R2_SECRET_ACCESS_KEY" \
            endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            region=auto \
            no_check_bucket=true

      - name: "DEBUG (temporary): verify rclone config is clean"
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          echo "--- rclone config redacted (secrets masked by rclone itself) ---"
          rclone config redacted r2
          echo "--- secret lengths (length only, never contents) ---"
          echo -n "R2_ACCOUNT_ID length: "; echo -n "$R2_ACCOUNT_ID" | wc -c
          echo -n "R2_ACCESS_KEY_ID length: "; echo -n "$R2_ACCESS_KEY_ID" | wc -c
          echo -n "R2_SECRET_ACCESS_KEY length: "; echo -n "$R2_SECRET_ACCESS_KEY" | wc -c

      - name: Smoke-test R2 connectivity
        run: rclone lsd r2:mtjawnny

      - name: Fetch Scryfall bulk data (live)
        run: python3 pipeline/fetch.py

      - name: Trim + merge tags
        run: python3 pipeline/trim_merge.py

      - name: Embed (incremental, cache pulled from R2)
        run: python3 pipeline/embed.py

      - name: Compute neighbors
        run: python3 pipeline/neighbors.py

      - name: Build cards.sqlite
        run: python3 pipeline/build_db.py

      - name: Build finisher artifacts
        run: python3 pipeline/finisher_artifacts.py

      - name: Build shards
        run: python3 pipeline/shards.py

      - name: Validate
        run: python3 pipeline/validate.py

      - name: Upload versioned artifacts + flip latest.json
        run: python3 pipeline/upload.py
